# team-config.yaml — Multi-LLM Orchestrator 프로젝트 설정
orchestrator:
  max_parallel_agents: 4
  timeout_per_task: 600
  log_level: info
  dashboard:
    enabled: true
    port: 3000
    host: localhost

agents:
  architect:
    cli: claude
    role: "소프트웨어 아키텍트"
    model: "claude-sonnet-4-20250514"
    timeout: 300
  implementer:
    cli: codex
    role: "백엔드 구현 개발자"
    model: "o4-mini"
    timeout: 300
  reviewer:
    cli: gemini
    role: "코드 리뷰어"
    model: "gemini-2.5-pro"
    timeout: 300

tasks:
  design:
    description: "태스크에 대한 구현 계획을 설계합니다"
    agent: architect
    priority: 1
  implement:
    description: "설계를 기반으로 코드를 구현합니다"
    agent: implementer
    depends_on: [design]
    priority: 2
  review:
    description: "구현된 코드를 리뷰합니다"
    agent: reviewer
    depends_on: [implement]
    priority: 3
