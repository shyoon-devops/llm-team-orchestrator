# presets/teams/feature-team.yaml
name: feature-team
description: "기능 구현 팀: 설계 → 구현 → 리뷰 → 테스트"

agents:
  architect:
    preset: architect
  implementer:
    preset: implementer
    overrides:
      limits:
        timeout: 600
  reviewer:
    preset: reviewer
  tester:
    preset: tester

tasks:
  design:
    description: |
      아래 사용자 요청을 분석하고, 소프트웨어 아키텍처를 설계하라.

      반드시 포함할 내용:
      1. 디렉토리 구조 및 파일 목록 (정확한 경로)
      2. 각 모듈/클래스/함수의 인터페이스 정의 (시그니처, 파라미터, 반환값)
      3. 모듈 간 의존 관계
      4. 핵심 설계 결정 사항과 그 이유

      주의: 코드 파일을 직접 생성하지 마라. 설계 문서만 작성하라.
    agent: architect
    depends_on: []
  implement:
    description: |
      이전 단계(architect)의 설계 결과를 바탕으로 실제 코드를 구현하라.

      반드시 지킬 것:
      1. architect가 정의한 파일 경로, 함수 시그니처, 모듈 구조를 정확히 따를 것
      2. 모든 코드 블록에 파일 경로를 명시할 것 (예: ```python:src/calculator.py)
      3. 동작하는 완전한 코드를 작성할 것 (스텁이나 TODO 금지)
      4. 타입 힌트와 docstring을 포함할 것
    agent: implementer
    depends_on:
      - design
  review:
    description: |
      이전 단계(implementer)가 구현한 코드를 리뷰하라.

      리뷰 기준:
      1. architect의 설계를 정확히 따랐는지 확인
      2. 코드 품질, 가독성, 잠재적 버그 검토
      3. 에러 처리 누락 여부
      4. 코딩 컨벤션 준수 여부

      반드시 첫 줄에 JSON verdict를 출력하라:
      {"verdict": "approve" 또는 "reject", "feedback": "구체적 피드백"}
    agent: reviewer
    depends_on:
      - implement
  test:
    description: |
      이전 단계(implementer)가 구현한 코드에 대한 테스트를 작성하라.

      반드시 포함할 것:
      1. 각 public 함수에 대한 단위 테스트
      2. 정상 케이스와 엣지 케이스 (경계값, 빈 입력, 에러 상황)
      3. pytest 형식으로 작성
      4. 테스트 파일 경로를 코드 블록에 명시 (예: ```python:tests/test_calculator.py)
    agent: tester
    depends_on:
      - implement

workflow: dag
synthesis_strategy: narrative
